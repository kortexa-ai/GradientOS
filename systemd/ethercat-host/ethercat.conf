# Bind the EtherCAT master to the dedicated port (by MAC).
#
# NOTE (RevPi Connect 5 bring-up):
# - eth0 (MAC ...:75) is the SoC MAC (`macb`) and was confirmed working with IgH `ec_generic`.
# - eth1 (MAC ...:76) is the PCI NIC (`lan743x`) and did not receive EtherCAT replies in our setup.
# Therefore we bind the master to MAC ...:75 (eth0) for the appliance wiring.
MASTER0_DEVICE="c8:3e:a7:14:1c:75"

# Use the generic driver first.
DEVICE_MODULES="generic"

